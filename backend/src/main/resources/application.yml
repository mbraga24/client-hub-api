server:
  port: 8080
  error:
    include-message: always

spring:
  flyway:
    clean-on-validation-error: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5332/customer_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:adminpassword}
  jpa:
    hibernate:
#      ddl-auto: create-drop
      ddl-auto: validate # validates if the Customer entity matches with the schema with Flyway
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQL10Dialect
        format_sql: true
    show-sql: true
